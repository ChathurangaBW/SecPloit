name: qa

on:
  push:
    branches: [main, "feat/**"]
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: qa-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint:
    name: lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
      - name: Install development dependencies
        run: python -m pip install --upgrade pip && pip install -e '.[dev]'
      - name: Ruff
        run: ruff check .
      - name: Compile all Python modules
        run: python -m compileall -q app runner scripts scanner.py

  unit:
    name: unit-python-${{ matrix.python-version }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.11", "3.12"]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip
      - name: Install test dependencies
        run: python -m pip install --upgrade pip && pip install -e '.[dev]'
      - name: Unit and integration tests
        run: >-
          pytest
          --cov=app
          --cov=runner
          --cov-report=term-missing
          --cov-report=xml
      - name: Upload coverage
        if: matrix.python-version == '3.12'
        uses: actions/upload-artifact@v4
        with:
          name: coverage-xml
          path: coverage.xml
          if-no-files-found: error

  package:
    name: package
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
      - name: Build distribution
        run: |
          python -m pip install --upgrade pip
          pip install build twine
          python -m build
          twine check dist/*
      - name: Install wheel and test entry points
        run: |
          python -m venv /tmp/secploit-wheel-test
          /tmp/secploit-wheel-test/bin/pip install dist/*.whl
          /tmp/secploit-wheel-test/bin/secploit --help
          /tmp/secploit-wheel-test/bin/secploit-browser --help
      - name: Upload distributions
        uses: actions/upload-artifact@v4
        with:
          name: python-distributions
          path: dist/*
          if-no-files-found: error

  compose-config:
    name: compose-config
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Validate Compose configuration
        run: |
          cp .env.example .env
          sed -i 's/^OPENAI_API_KEY=.*/OPENAI_API_KEY=qa-placeholder/' .env
          docker compose config --quiet
          docker compose --profile range config --quiet

  docker-smoke:
    name: docker-smoke
    needs: [lint, unit, package, compose-config]
    runs-on: ubuntu-latest
    timeout-minutes: 75
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
      - name: Prepare environment
        run: |
          cp .env.example .env
          sed -i 's/^OPENAI_API_KEY=.*/OPENAI_API_KEY=qa-placeholder/' .env
          pip install httpx
      - name: Build control and runner images
        run: docker compose build --pull control runner
      - name: Start control plane, runner, and private range
        run: docker compose --profile range up -d --no-build
      - name: Wait for control plane and private range
        run: |
          curl --fail --silent --show-error --retry 40 --retry-delay 5 --retry-all-errors \
            http://127.0.0.1:8000/health >/tmp/secploit-health.json
          cat /tmp/secploit-health.json
          docker compose ps
          docker compose exec -T control python - <<'PY'
          import time

          import httpx

          targets = ("http://juice-shop:3000", "http://dvwa")
          errors: list[str] = []
          for attempt in range(40):
              errors.clear()
              for target in targets:
                  try:
                      response = httpx.get(target, timeout=10.0, follow_redirects=True)
                      response.raise_for_status()
                  except Exception as exc:
                      errors.append(f"{target}: {type(exc).__name__}: {exc}")
              if not errors:
                  print("Private-range services are reachable from the control network")
                  break
              print(f"Range readiness attempt {attempt + 1}: {'; '.join(errors)}")
              time.sleep(5)
          else:
              raise SystemExit("Private-range readiness failed: " + "; ".join(errors))
          PY
      - name: Run end-to-end control-plane smoke test
        run: python scripts/qa_smoke.py --base-url http://127.0.0.1:8000
      - name: Inspect container security configuration
        run: |
          docker inspect secploit-control-1 > /tmp/control-inspect.json
          docker inspect secploit-runner-1 > /tmp/runner-inspect.json
          python - <<'PY'
          import json
          from pathlib import Path

          control = json.loads(Path('/tmp/control-inspect.json').read_text())[0]
          runner = json.loads(Path('/tmp/runner-inspect.json').read_text())[0]
          assert control['Config']['User'] == 'secploit'
          assert runner['HostConfig']['Binds'] == ['/var/run/docker.sock:/var/run/docker.sock:rw']
          assert control['State']['Running'] is True
          assert runner['State']['Running'] is True
          print('Container configuration assertions passed')
          PY
      - name: Capture Compose logs
        if: always()
        run: docker compose --profile range logs --no-color > qa-compose.log
      - name: Upload smoke logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: qa-compose-logs
          path: qa-compose.log
          if-no-files-found: warn
      - name: Tear down
        if: always()
        run: docker compose --profile range down --volumes --remove-orphans
