name: release

on:
  push:
    branches: [main]
    paths:
      - "app/**"
      - "runner/**"
      - "scanner.py"
      - "Dockerfile.control"
      - "Dockerfile.runner"
      - "docker-compose.yml"
      - "pyproject.toml"
      - "README.md"
      - "RELEASE.md"
      - ".github/workflows/release.yml"
  workflow_dispatch:

permissions:
  contents: write
  packages: write
  issues: write
  pull-requests: write

concurrency:
  group: secploit-release
  cancel-in-progress: false

jobs:
  publish-release:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
      - name: Determine version
        id: version
        run: |
          VERSION=$(python - <<'PY'
          import tomllib
          from pathlib import Path
          data = tomllib.loads(Path('pyproject.toml').read_text(encoding='utf-8'))
          print(data['project']['version'])
          PY
          )
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "tag=v$VERSION" >> "$GITHUB_OUTPUT"
      - name: Check existing release
        id: existing
        env:
          GH_TOKEN: ${{ github.token }}
          TAG: ${{ steps.version.outputs.tag }}
        run: |
          if gh release view "$TAG" --repo "$GITHUB_REPOSITORY" >/dev/null 2>&1; then
            echo "exists=true" >> "$GITHUB_OUTPUT"
          else
            echo "exists=false" >> "$GITHUB_OUTPUT"
          fi
      - name: Build distributions
        if: steps.existing.outputs.exists != 'true'
        run: |
          python -m pip install --upgrade pip
          pip install build twine
          python -m build
          twine check dist/*
      - name: Create release
        if: steps.existing.outputs.exists != 'true'
        env:
          GH_TOKEN: ${{ github.token }}
          TAG: ${{ steps.version.outputs.tag }}
          VERSION: ${{ steps.version.outputs.version }}
        run: |
          gh release create "$TAG" dist/* \
            --repo "$GITHUB_REPOSITORY" \
            --target "$GITHUB_SHA" \
            --title "SecPloit ${VERSION}" \
            --notes-file RELEASE.md

  publish-packages:
    needs: publish-release
    runs-on: ubuntu-latest
    timeout-minutes: 90
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: control
            dockerfile: Dockerfile.control
          - name: runner
            dockerfile: Dockerfile.runner
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Resolve image metadata
        id: meta
        run: |
          OWNER=$(printf '%s' "$GITHUB_REPOSITORY_OWNER" | tr '[:upper:]' '[:lower:]')
          VERSION=$(python - <<'PY'
          import tomllib
          from pathlib import Path
          data = tomllib.loads(Path('pyproject.toml').read_text(encoding='utf-8'))
          print(data['project']['version'])
          PY
          )
          echo "owner=$OWNER" >> "$GITHUB_OUTPUT"
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
      - uses: docker/build-push-action@v6
        with:
          context: .
          file: ${{ matrix.dockerfile }}
          push: true
          tags: |
            ghcr.io/${{ steps.meta.outputs.owner }}/secploit-${{ matrix.name }}:${{ steps.meta.outputs.version }}
            ghcr.io/${{ steps.meta.outputs.owner }}/secploit-${{ matrix.name }}:latest
          labels: |
            org.opencontainers.image.source=${{ github.server_url }}/${{ github.repository }}
            org.opencontainers.image.version=${{ steps.meta.outputs.version }}
            org.opencontainers.image.licenses=MIT
          cache-from: type=gha,scope=secploit-${{ matrix.name }}
          cache-to: type=gha,mode=max,scope=secploit-${{ matrix.name }}

  verify-packages:
    needs: publish-packages
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Verify versioned and latest manifests
        id: verify
        run: |
          OWNER=$(printf '%s' "$GITHUB_REPOSITORY_OWNER" | tr '[:upper:]' '[:lower:]')
          VERSION=$(python - <<'PY'
          import tomllib
          from pathlib import Path
          data = tomllib.loads(Path('pyproject.toml').read_text(encoding='utf-8'))
          print(data['project']['version'])
          PY
          )
          for image in control runner; do
            docker buildx imagetools inspect "ghcr.io/${OWNER}/secploit-${image}:${VERSION}" >/dev/null
            docker buildx imagetools inspect "ghcr.io/${OWNER}/secploit-${image}:latest" >/dev/null
          done
          echo "owner=$OWNER" >> "$GITHUB_OUTPUT"
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
      - name: Record verification on associated pull request
        env:
          GH_TOKEN: ${{ github.token }}
          OWNER: ${{ steps.verify.outputs.owner }}
          VERSION: ${{ steps.verify.outputs.version }}
        run: |
          PR_NUMBER=$(gh api \
            -H "Accept: application/vnd.github+json" \
            "repos/${GITHUB_REPOSITORY}/commits/${GITHUB_SHA}/pulls" \
            --jq '.[0].number // empty')
          if [ -n "$PR_NUMBER" ]; then
            gh pr comment "$PR_NUMBER" --repo "$GITHUB_REPOSITORY" --body "Package verification passed for SecPloit ${VERSION}:\n\n- \`ghcr.io/${OWNER}/secploit-control:${VERSION}\`\n- \`ghcr.io/${OWNER}/secploit-control:latest\`\n- \`ghcr.io/${OWNER}/secploit-runner:${VERSION}\`\n- \`ghcr.io/${OWNER}/secploit-runner:latest\`\n\nAll four OCI manifests were resolved successfully after publication."
          fi
