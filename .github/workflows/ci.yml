name: ci

on:
  push:
    branches: [main, "feat/**"]
  pull_request:

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
      - name: Install
        run: pip install -e '.[dev]'
      - name: Test
        run: pytest --cov=app --cov=runner --cov-report=term-missing
      - name: Compile
        run: python -m compileall -q app runner scanner.py
