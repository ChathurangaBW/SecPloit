name: materialize-secploit-v2

on:
  pull_request:
    branches: [main]
    types: [opened, synchronize, reopened]
  push:
    branches: ["feat/secploit-v2-range-agent"]

permissions:
  contents: write

jobs:
  materialize:
    if: github.event_name == 'pull_request' && github.head_ref == 'feat/secploit-v2-range-agent'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: feat/secploit-v2-range-agent
          fetch-depth: 0
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Materialize project when needed
        run: |
          if [ ! -f tools/materialize_v2.py ]; then
            echo "SecPloit v2 is already materialized."
            exit 0
          fi
          python tools/materialize_v2.py
      - name: Commit generated project when changed
        run: |
          if git diff --quiet && git diff --cached --quiet; then
            echo "No materialization changes."
            exit 0
          fi
          git config user.name "SecPloit Builder"
          git config user.email "actions@users.noreply.github.com"
          git add -A
          git commit -m "feat: build SecPloit v2 autonomous range agent"
          git push origin HEAD:feat/secploit-v2-range-agent
