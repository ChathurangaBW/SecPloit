services:
  agent:
    build: .
    env_file:
      - .env
    ports:
      - "8000:8000"
    volumes:
      - agent-data:/app/data
    read_only: true
    tmpfs:
      - /tmp:size=128m,mode=1777
    cap_drop:
      - ALL
    security_opt:
      - no-new-privileges:true
    pids_limit: 256
    mem_limit: 2g
    cpus: 2.0
    restart: unless-stopped

volumes:
  agent-data:
