<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>SecPloit</title>
  <link rel="stylesheet" href="/static/style.css">
</head>
<body>
  <header>
    <div>
      <p class="eyebrow">AUTONOMOUS RANGE RESEARCH</p>
      <h1>SecPloit</h1>
    </div>
    <div id="health" class="health">connecting</div>
  </header>

  <main>
    <section class="panel new-job">
      <h2>New engagement</h2>
      <form id="job-form">
        <label>Target
          <input id="target" value="http://juice-shop:3000" required>
        </label>
        <label>Objective
          <textarea id="objective" required>Map the attack surface and validate high-confidence web vulnerabilities with reproducible evidence.</textarea>
        </label>
        <label>Step budget
          <input id="steps" type="number" min="1" max="200" value="20">
        </label>
        <button type="submit">Launch autonomous assessment</button>
      </form>
      <p id="form-error" class="error"></p>
    </section>

    <section class="panel jobs">
      <div class="section-title">
        <h2>Engagements</h2>
        <button id="refresh" class="secondary">Refresh</button>
      </div>
      <div id="job-list"></div>
    </section>

    <section class="panel detail">
      <div class="section-title">
        <h2>Live research trace</h2>
        <button id="cancel" class="danger" disabled>Cancel</button>
      </div>
      <div id="job-summary" class="muted">Select an engagement.</div>
      <div id="findings"></div>
      <div id="events" class="events"></div>
      <article id="report" class="report"></article>
    </section>
  </main>

  <script src="/static/app.js"></script>
</body>
</html>
